name: Backfill 13F Filings

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      start_date:
        description: First SEC index date to discover, YYYY-MM-DD
        required: true
        default: "2026-01-01"
        type: string
      end_date:
        description: Last SEC index date to discover, YYYY-MM-DD. Leave empty for today.
        required: false
        type: string
      run_id:
        description: Optional stable Firestore run id for reruns
        required: false
        type: string
      discovery_chunk_days:
        description: Number of daily indexes to discover per chunk
        required: true
        default: "7"
        type: string
      max_filings_per_index:
        description: Max 13F filings to discover per daily index
        required: true
        default: "5000"
        type: string
      process_batch_size:
        description: Max queued filings to process per queue batch
        required: true
        default: "25"
        type: string
      max_process_batches:
        description: Max queue batches to process after discovery
        required: true
        default: "4"
        type: string
      dry_run:
        description: Discover and parse without Firestore writes
        required: true
        default: true
        type: boolean
      include_stale_processing:
        description: Retry stale PROCESSING filings
        required: true
        default: true
        type: boolean
      stale_processing_minutes:
        description: PROCESSING age before a filing is considered stale
        required: true
        default: "60"
        type: string

permissions:
  contents: read

concurrency:
  group: thirteen-f-backfill-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  backfill-13f:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Backfill 13F filings
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          RUN_ID: ${{ inputs.run_id }}
          DISCOVERY_CHUNK_DAYS: ${{ inputs.discovery_chunk_days }}
          MAX_FILINGS_PER_INDEX: ${{ inputs.max_filings_per_index }}
          PROCESS_BATCH_SIZE: ${{ inputs.process_batch_size }}
          MAX_PROCESS_BATCHES: ${{ inputs.max_process_batches }}
          DRY_RUN: ${{ inputs.dry_run }}
          INCLUDE_STALE_PROCESSING: ${{ inputs.include_stale_processing }}
          STALE_PROCESSING_MINUTES: ${{ inputs.stale_processing_minutes }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          body="$(jq -n \
            --arg startDate "$START_DATE" \
            --arg endDate "$END_DATE" \
            --arg runId "$RUN_ID" \
            --argjson discoveryChunkDays "$DISCOVERY_CHUNK_DAYS" \
            --argjson maxFilingsPerIndex "$MAX_FILINGS_PER_INDEX" \
            --argjson processBatchSize "$PROCESS_BATCH_SIZE" \
            --argjson maxProcessBatches "$MAX_PROCESS_BATCHES" \
            --argjson dryRun "$DRY_RUN" \
            --argjson includeStaleProcessing "$INCLUDE_STALE_PROCESSING" \
            --argjson staleProcessingMinutes "$STALE_PROCESSING_MINUTES" \
            '{
              startDate: $startDate,
              discoveryChunkDays: $discoveryChunkDays,
              maxFilingsPerIndex: $maxFilingsPerIndex,
              processBatchSize: $processBatchSize,
              maxProcessBatches: $maxProcessBatches,
              dryRun: $dryRun,
              includeStaleProcessing: $includeStaleProcessing,
              staleProcessingMinutes: $staleProcessingMinutes
            }
            | if $endDate == "" then . else . + { endDate: $endDate } end
            | if $runId == "" then . else . + { runId: $runId } end')"

          echo "Calling ${CLOUD_RUN_URL}/api/internal/securities/backfill-13f"
          echo "Request body: $body"

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "${CLOUD_RUN_URL}/api/internal/securities/backfill-13f" || true)"

          cat "$response_file"
          echo

          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "13F backfill failed with HTTP $status" >&2
            exit 1
          fi
