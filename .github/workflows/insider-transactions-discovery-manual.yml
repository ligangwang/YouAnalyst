name: Discover Insider Transactions

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      date:
        description: Single SEC index date, YYYY-MM-DD. Leave empty to use start_date or lookback_days.
        required: false
        type: string
      start_date:
        description: First SEC index date to discover, YYYY-MM-DD. Leave empty to use date or lookback_days.
        required: false
        type: string
      end_date:
        description: Last SEC index date to discover, YYYY-MM-DD. Leave empty for today when start_date is set.
        required: false
        type: string
      lookback_days:
        description: Number of recent calendar days to inspect when date is empty
        required: true
        default: "3"
        type: string
      dry_run:
        description: Fetch and parse indexes without Firestore writes
        required: true
        default: true
        type: boolean
      reprocess_existing:
        description: Requeue filings already marked PARSED or PROCESSING
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: insider-transactions-discovery-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  discover-insider-transactions:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Discover insider transaction filings
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          INDEX_DATE: ${{ inputs.date }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days }}
          DRY_RUN: ${{ inputs.dry_run }}
          REPROCESS_EXISTING: ${{ inputs.reprocess_existing }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          if [[ -n "$INDEX_DATE" ]]; then
            body="$(jq -n \
              --arg date "$INDEX_DATE" \
              --argjson dryRun "$DRY_RUN" \
              --argjson reprocessExisting "$REPROCESS_EXISTING" \
              '{
                date: $date,
                dryRun: $dryRun,
                reprocessExisting: $reprocessExisting,
                discoverOnly: true
              }')"
          elif [[ -n "$START_DATE" ]]; then
            end_date="$END_DATE"
            if [[ -z "$end_date" ]]; then
              end_date="$(date -u +%F)"
            fi

            dates_json="[]"
            current="$START_DATE"
            while [[ "$current" < "$end_date" || "$current" == "$end_date" ]]; do
              dates_json="$(jq --arg date "$current" '. + [$date]' <<< "$dates_json")"
              current="$(date -u -d "$current + 1 day" +%F)"
            done

            body="$(jq -n \
              --argjson dates "$dates_json" \
              --argjson dryRun "$DRY_RUN" \
              --argjson reprocessExisting "$REPROCESS_EXISTING" \
              '{
                dates: $dates,
                dryRun: $dryRun,
                reprocessExisting: $reprocessExisting,
                discoverOnly: true
              }')"
          else
            body="$(jq -n \
              --argjson lookbackDays "$LOOKBACK_DAYS" \
              --argjson dryRun "$DRY_RUN" \
              --argjson reprocessExisting "$REPROCESS_EXISTING" \
              '{
                lookbackDays: $lookbackDays,
                dryRun: $dryRun,
                reprocessExisting: $reprocessExisting,
                discoverOnly: true
              }')"
          fi

          echo "Calling ${CLOUD_RUN_URL}/api/internal/securities/sync-insider-transactions"
          echo "Request body: $body"

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "${CLOUD_RUN_URL}/api/internal/securities/sync-insider-transactions" || true)"

          cat "$response_file"
          echo

          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "Insider transaction discovery failed with HTTP $status" >&2
            exit 1
          fi

          echo "Completed insider transaction discovery."
          echo "Filings found: $(jq -r '.filingsFound // 0' "$response_file")"
          echo "Filings queued: $(jq -r '.filingsQueued // 0' "$response_file")"
          echo "Filings existing: $(jq -r '.filingsExisting // 0' "$response_file")"
          echo "Index errors: $(jq -r '.indexErrors | length // 0' "$response_file")"
