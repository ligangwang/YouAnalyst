name: Process 13F Queue

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      limit:
        description: Max queued filings to process
        required: true
        default: "10"
        type: string
      dry_run:
        description: Parse without queue status updates or holding writes
        required: true
        default: true
        type: boolean
      include_stale_processing:
        description: Retry stale PROCESSING filings
        required: true
        default: true
        type: boolean
      stale_processing_minutes:
        description: PROCESSING age before a filing is considered stale
        required: true
        default: "60"
        type: string

permissions:
  contents: read

concurrency:
  group: thirteen-f-queue-process-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  process-13f-queue:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Process 13F queue
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          LIMIT: ${{ inputs.limit }}
          DRY_RUN: ${{ inputs.dry_run }}
          INCLUDE_STALE_PROCESSING: ${{ inputs.include_stale_processing }}
          STALE_PROCESSING_MINUTES: ${{ inputs.stale_processing_minutes }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          body="$(jq -n \
            --argjson limit "$LIMIT" \
            --argjson dryRun "$DRY_RUN" \
            --argjson includeStaleProcessing "$INCLUDE_STALE_PROCESSING" \
            --argjson staleProcessingMinutes "$STALE_PROCESSING_MINUTES" \
            '{
              limit: $limit,
              dryRun: $dryRun,
              includeStaleProcessing: $includeStaleProcessing,
              staleProcessingMinutes: $staleProcessingMinutes
            }')"

          echo "Calling ${CLOUD_RUN_URL}/api/internal/securities/process-13f-queue"
          echo "Request body: $body"

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "${CLOUD_RUN_URL}/api/internal/securities/process-13f-queue" || true)"

          cat "$response_file"
          echo

          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "13F queue processing failed with HTTP $status" >&2
            exit 1
          fi
