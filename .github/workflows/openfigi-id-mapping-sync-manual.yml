name: Sync OpenFIGI ID Mappings

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      exchange:
        description: OpenFIGI exchange code, or ANY to search without exchange filter
        required: true
        default: US
        type: string
      max_cusips:
        description: Max unmapped 13F CUSIPs to map per API call
        required: true
        default: "1000"
        type: string
      max_api_calls:
        description: Max API calls to make in this workflow run
        required: true
        default: "25"
        type: string
      stop_when_written_below:
        description: Stop after an API call writes fewer mappings than this number
        required: true
        default: "10"
        type: string
      seconds_between_calls:
        description: Seconds to wait between API calls
        required: true
        default: "2"
        type: string
      dry_run:
        description: Fetch and parse without Firestore writes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: openfigi-id-mapping-sync-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  sync-openfigi-id-mappings:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Sync OpenFIGI ID mappings
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          EXCHANGE: ${{ inputs.exchange }}
          MAX_CUSIPS: ${{ inputs.max_cusips }}
          MAX_API_CALLS: ${{ inputs.max_api_calls }}
          STOP_WHEN_WRITTEN_BELOW: ${{ inputs.stop_when_written_below }}
          SECONDS_BETWEEN_CALLS: ${{ inputs.seconds_between_calls }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          total_fetched=0
          total_mapped=0
          total_written=0
          total_skipped=0
          total_batches=0
          total_warnings=0
          total_errors=0

          for ((call_number = 1; call_number <= MAX_API_CALLS; call_number += 1)); do
            body="$(jq -n \
              --arg exchange "$EXCHANGE" \
              --argjson maxCusips "$MAX_CUSIPS" \
              --argjson dryRun "$DRY_RUN" \
              '{
                exchange: $exchange,
                maxCusips: $maxCusips,
                dryRun: $dryRun
              }')"

            echo "Calling ${CLOUD_RUN_URL}/api/internal/securities/sync-openfigi-id-mappings (${call_number}/${MAX_API_CALLS})"
            echo "Request body: $body"

            response_file="$(mktemp)"
            status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "$body" \
              "${CLOUD_RUN_URL}/api/internal/securities/sync-openfigi-id-mappings" || true)"

            cat "$response_file"
            echo

            if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
              echo "OpenFIGI ID mapping sync failed with HTTP $status on call $call_number" >&2
              exit 1
            fi

            fetched="$(jq -r '.fetched // 0' "$response_file")"
            mapped="$(jq -r '.mapped // 0' "$response_file")"
            written="$(jq -r '.written // 0' "$response_file")"
            skipped="$(jq -r '.skipped // 0' "$response_file")"
            batches="$(jq -r '.batches // 0' "$response_file")"
            warnings="$(jq -r '.warnings // 0' "$response_file")"
            errors="$(jq -r '.errors // 0' "$response_file")"

            total_fetched=$((total_fetched + fetched))
            total_mapped=$((total_mapped + mapped))
            total_written=$((total_written + written))
            total_skipped=$((total_skipped + skipped))
            total_batches=$((total_batches + batches))
            total_warnings=$((total_warnings + warnings))
            total_errors=$((total_errors + errors))

            echo "Completed OpenFIGI ID mapping sync call $call_number."
            echo "Fetched: $fetched"
            echo "Mapped: $mapped"
            echo "Written: $written"
            echo "Skipped: $skipped"
            echo "Batches: $batches"
            echo "Warnings: $warnings"
            echo "Errors: $errors"

            if [[ "$fetched" -le 0 ]]; then
              echo "Stopping because no unmapped CUSIPs were fetched."
              break
            fi

            if [[ "$written" -lt "$STOP_WHEN_WRITTEN_BELOW" ]]; then
              echo "Stopping because written mappings ($written) is below $STOP_WHEN_WRITTEN_BELOW."
              break
            fi

            if [[ "$call_number" -lt "$MAX_API_CALLS" && "$SECONDS_BETWEEN_CALLS" -gt 0 ]]; then
              sleep "$SECONDS_BETWEEN_CALLS"
            fi
          done

          echo "Completed OpenFIGI ID mapping sync batches."
          echo "Fetched: $total_fetched"
          echo "Mapped: $total_mapped"
          echo "Written: $total_written"
          echo "Skipped: $total_skipped"
          echo "Batches: $total_batches"
          echo "Warnings: $total_warnings"
          echo "Errors: $total_errors"
