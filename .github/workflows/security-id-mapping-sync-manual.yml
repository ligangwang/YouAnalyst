name: Sync Security ID Mappings

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      source:
        description: Mapping provider to sync
        required: true
        default: eodhd
        type: choice
        options:
          - eodhd
          - openfigi
      exchange:
        description: Exchange code
        required: true
        default: US
        type: string
      page_limit:
        description: EODHD page size, max 1000
        required: true
        default: "1000"
        type: string
      page_offset:
        description: Starting page offset
        required: true
        default: "0"
        type: string
      max_pages:
        description: Total max pages to sync across batched requests
        required: true
        default: "200"
        type: string
      openfigi_cusip_limit:
        description: Max unmapped CUSIPs to map with OpenFIGI
        required: true
        default: "100"
        type: string
      pages_per_request:
        description: Pages per Cloud Run request
        required: true
        default: "5"
        type: string
      dry_run:
        description: Fetch and parse without Firestore writes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: security-id-mapping-sync-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  sync-id-mappings:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Sync security ID mappings
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          SOURCE: ${{ inputs.source }}
          EXCHANGE: ${{ inputs.exchange }}
          PAGE_LIMIT: ${{ inputs.page_limit }}
          PAGE_OFFSET: ${{ inputs.page_offset }}
          MAX_PAGES: ${{ inputs.max_pages }}
          OPENFIGI_CUSIP_LIMIT: ${{ inputs.openfigi_cusip_limit }}
          PAGES_PER_REQUEST: ${{ inputs.pages_per_request }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          if [[ "$SOURCE" == "openfigi" ]]; then
            body="$(jq -n \
              --arg source "$SOURCE" \
              --arg exchange "$EXCHANGE" \
              --argjson maxCusips "$OPENFIGI_CUSIP_LIMIT" \
              --argjson dryRun "$DRY_RUN" \
              '{
                source: $source,
                exchange: $exchange,
                maxCusips: $maxCusips,
                dryRun: $dryRun
              }')"

            echo "Calling ${CLOUD_RUN_URL}/api/internal/securities/sync-id-mappings"
            echo "Request body: $body"

            response_file="$(mktemp)"
            status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "$body" \
              "${CLOUD_RUN_URL}/api/internal/securities/sync-id-mappings" || true)"

            cat "$response_file"
            echo

            if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
              echo "Security ID mapping sync failed with HTTP $status" >&2
              exit 1
            fi

            echo "Completed OpenFIGI security ID mapping sync."
            echo "Fetched: $(jq -r '.fetched // 0' "$response_file")"
            echo "Mapped: $(jq -r '.mapped // 0' "$response_file")"
            echo "Written: $(jq -r '.written // 0' "$response_file")"
            echo "Skipped: $(jq -r '.skipped // 0' "$response_file")"
            echo "Warnings: $(jq -r '.warnings // 0' "$response_file")"
            echo "Errors: $(jq -r '.errors // 0' "$response_file")"
            exit 0
          fi

          offset="$PAGE_OFFSET"
          remaining="$MAX_PAGES"
          pages_per_request="$PAGES_PER_REQUEST"
          total_pages=0
          total_fetched=0
          total_mapped=0
          total_written=0
          total_skipped=0

          while [[ "$remaining" -gt 0 ]]; do
            batch_pages="$pages_per_request"
            if [[ "$batch_pages" -gt "$remaining" ]]; then
              batch_pages="$remaining"
            fi

            body="$(jq -n \
              --arg exchange "$EXCHANGE" \
              --argjson pageLimit "$PAGE_LIMIT" \
              --argjson pageOffset "$offset" \
              --argjson maxPages "$batch_pages" \
              --argjson dryRun "$DRY_RUN" \
              '{
                exchange: $exchange,
                pageLimit: $pageLimit,
                pageOffset: $pageOffset,
                maxPages: $maxPages,
                dryRun: $dryRun
              }')"

            echo "Calling ${CLOUD_RUN_URL}/api/internal/securities/sync-id-mappings"
            echo "Request body: $body"

            response_file="$(mktemp)"
            status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "$body" \
              "${CLOUD_RUN_URL}/api/internal/securities/sync-id-mappings" || true)"

            cat "$response_file"
            echo

            if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
              echo "Security ID mapping sync failed with HTTP $status" >&2
              exit 1
            fi

            pages="$(jq -r '.pages // 0' "$response_file")"
            fetched="$(jq -r '.fetched // 0' "$response_file")"
            mapped="$(jq -r '.mapped // 0' "$response_file")"
            written="$(jq -r '.written // 0' "$response_file")"
            skipped="$(jq -r '.skipped // 0' "$response_file")"
            has_more="$(jq -r '.hasMore // false' "$response_file")"
            next_offset="$(jq -r '.nextOffset // empty' "$response_file")"

            total_pages=$((total_pages + pages))
            total_fetched=$((total_fetched + fetched))
            total_mapped=$((total_mapped + mapped))
            total_written=$((total_written + written))
            total_skipped=$((total_skipped + skipped))

            if [[ "$pages" -le 0 || "$has_more" != "true" || -z "$next_offset" ]]; then
              break
            fi

            offset="$next_offset"
            remaining=$((remaining - pages))
          done

          echo "Completed security ID mapping sync batches."
          echo "Pages: $total_pages"
          echo "Fetched: $total_fetched"
          echo "Mapped: $total_mapped"
          echo "Written: $total_written"
          echo "Skipped: $total_skipped"
